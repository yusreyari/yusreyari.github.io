<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yusuf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Yusuf</h1>
  </header>

  <div class="mobile-toggle">
    <button class="toggle-btn active" onclick="switchTab('writing')">Writing</button>
    <button class="toggle-btn" onclick="switchTab('photos')">Photos</button>
  </div>

  <div class="columns">
    <div class="column active" id="col-writing">
      <p class="column-title">Writing</p>
      <ul class="post-list" id="writing-list">
        <li>
          <span class="post-date">April 6, 2026</span>
          <div class="post-content" style="display:none;">
            <p>This is my first blog post. I built this website completely from scratch using HTML and CSS. No website builders, no WordPress — just code. This is the beginning of something.</p>
          </div>
        </li>
      </ul>
    </div>

    <div class="column" id="col-photos">
      <p class="column-title">Photos</p>
      <ul class="post-list" id="photos-list">
        <li>
          <span class="post-date">April 19, 2026</span>
          <div class="post-content" style="display:none;">
            <img src="IMG_2466.JPG" alt="photo" style="width: 100%; margin-top: 1rem; display: block;">
          </div>
        </li>
      
        <li>
          <span class="post-date">April 21, 2026</span>
          <div class="post-content" style="display:none;">
            <img src="IMG_2467 (1).jpg" alt="photo" style="width: 100%; margin-top: 1rem; display: block;">
          </div>
        </li>
      </ul>
    </div>
  </div>

  <script>
    document.querySelectorAll('.post-date').forEach(function(date) {
      date.addEventListener('click', function() {
        var content = this.nextElementSibling;
        if (content.style.display === 'none') {
          content.style.display = 'block';
        } else {
          content.style.display = 'none';
        }
      });
    });

    function switchTab(tab) {
      document.getElementById('col-writing').classList.remove('active');
      document.getElementById('col-photos').classList.remove('active');
      document.getElementById('col-' + tab).classList.add('active');

      document.querySelectorAll('.toggle-btn').forEach(function(btn) {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
