<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yusuf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Yusuf</h1>
  </header>
  <main>
    <ul class="post-list">
      <li>
        <span class="post-date">April 6, 2026</span>        <div class="post-content" style="display:none;">
          <p>This is my first blog post. I built this website completely from scratch using HTML and CSS. No website builders, no WordPress — just code. This is the beginning of something.</p>
        </div>
      </li>
    </ul>
  </main>
  <script>
    document.querySelectorAll('.post-date').forEach(function(date) {
      date.addEventListener('click', function() {
        var content = this.nextElementSibling;
        if (content.style.display === 'none') {
          content.style.display = 'block';
        } else {
          content.style.display = 'none';
        }
      });
    });
  </script>
</body>
</html>
