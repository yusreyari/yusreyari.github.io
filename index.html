<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yusuf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Yusuf</h1>
  </header>
  <main>
    <ul class="post-list">
      <li>
        <span class="post-date" onclick="toggle(this)">April 6, 2026</span>
        <div class="post-content" style="display:none;">
          <p>This is my first blog post. I built this website completely from scratch using HTML and CSS. No website builders, no WordPress — just code. This is the beginning of something.</p>
        </div>
      </li>
    </ul>
  </main>
  <script>
    function toggle(el) {
      const content = el.nextElementSibling;
      content.classList.toggle('open');
    }
  </script>
</body>
</html>
